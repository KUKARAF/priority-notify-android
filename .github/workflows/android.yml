name: Android Build

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;27.0.12077973"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Initialize Android project
        run: cargo tauri android init

      - name: Build APK
        run: cargo tauri android build --apk
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973

      - name: Sign APK
        if: env.HAS_KEYSTORE == 'true'
        env:
          HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
          APK_PATH=$(find src-tauri/gen/android -name '*.apk' -not -name '*unsigned*' | head -1)
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find src-tauri/gen/android -name '*unsigned*.apk' | head -1)
          fi
          ${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | tail -1)/apksigner sign \
            --ks keystore.jks \
            --ks-pass pass:${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }} \
            --ks-key-alias ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }} \
            --key-pass pass:${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }} \
            "$APK_PATH"
          rm keystore.jks

      - name: Prepare APK for release
        id: apk
        run: |
          APK=$(find src-tauri/gen/android -name '*.apk' | head -1)
          SHORT_SHA=${GITHUB_SHA::7}
          DEST="priority-notify-${SHORT_SHA}.apk"
          cp "$APK" "$DEST"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"
          echo "tag=build-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Delete previous rolling release
        run: gh release delete latest --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        run: |
          gh release create latest \
            "${{ steps.apk.outputs.path }}" \
            --title "Latest Build (${{ steps.apk.outputs.sha }})" \
            --notes "Built from \`${{ github.sha }}\` on $(date -u +%Y-%m-%d)" \
            --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
